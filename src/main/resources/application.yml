spring:
  application:
    name: meddocs

  # --- Datasource (matches compose.yaml's published port 5433) ---
  # The pgvector container is published on host 5433 to avoid a clash with a native
  # PostgreSQL on 5432. The app container overrides this via SPRING_DATASOURCE_URL.
  datasource:
    url: jdbc:postgresql://localhost:5433/mydatabase
    username: myuser
    password: secret

  # --- JPA / Hibernate ---
  jpa:
    # Flyway owns the schema; Hibernate only validates that entities match the DB.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Multipart uploads (Stage 3) ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# --- App config (Stage 2: JWT auth) ---
meddocs:
  jwt:
    # HMAC signing secret. MUST be >= 32 bytes for HS256. Real value comes from the
    # JWT_SECRET env var; the inline fallback is dev-only and must never ship to prod.
    secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-min-32-bytes-0123456789}
    # Token lifetime in milliseconds (3600000 = 1 hour). Short expiry, no refresh token
    # (a deliberate demo-simplicity trade-off — see ROADMAP §Stage 2).
    expiration-ms: 3600000

  # --- Ingestion pipeline (Stage 3) ---
  ingest:
    # Character-based chunking (~4 chars/token): ~800 tokens with ~100 overlap.
    chunk-size: 3200
    chunk-overlap: 400
    max-file-size-bytes: 10485760   # 10 MB
    allowed-content-types:
      - application/pdf
      - text/plain
      - text/markdown

  # --- RAG core (Stage 4) ---
  rag:
    top-k: 4
    similarity-threshold: 0.75
    snippet-max-chars: 320
    refusal-message: >-
      I don't have enough information in your documents to answer that.

  # Chat model selection: 'fake' (Stage 4 stand-in). Stage 5 swaps in a real local LLM (Ollama).
  chat: fake
