spring:
  application:
    name: meddocs

  # --- Datasource (matches compose.yaml) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret

  # --- JPA / Hibernate ---
  jpa:
    # Flyway owns the schema; Hibernate only validates that entities match the DB.
    hibernate:
      ddl-auto: validate
    open-in-view: false

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration
